<article class="news-card news-card-featured">

  <a href="{{ .RelPermalink }}">

    {{ if .Params.cover }}
    <img src="{{ .Params.cover }}" alt="{{ .Title }}">
    {{ end }}

    <p class="news-meta">
      {{ with .Params.categories }}
      {{ index . 0 }}
      {{ end }}
      · {{ .Date.Format "Jan 2, 2006" }}
    </p>

    <h1 class="news-card-title">
      {{ .Title }}
    </h1>

    <p>
      {{ .Summary | plainify | truncate 180 }}
    </p>

  </a>

</article>
