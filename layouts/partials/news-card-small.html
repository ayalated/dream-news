<article class="news-card news-card-small">

  <a href="{{ .RelPermalink }}">

    {{ if .Params.cover }}
    <img src="{{ .Params.cover }}" alt="{{ .Title }}">
    {{ end }}

    <h3 class="news-card-title">
      {{ .Title }}
    </h3>

    <p class="news-meta">
      {{ .Date.Format "Jan 2, 2006" }}
    </p>

  </a>

</article>
