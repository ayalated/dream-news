<div class="news-source-column">
  <h3>{{ .title }}</h3>
  {{ range first 5 .posts }}
  <a class="news-item" href="{{ .RelPermalink }}">
    <div class="news-text">
      <h4>{{ .Title }}</h4>
    </div>
    {{ if .Params.cover }}
    <div class="news-thumb">
      <img src="{{ .Params.cover }}" alt="{{ .Title }}" loading="lazy">
    </div>
    {{ end }}
  </a>
  {{ end }}
</div>
